<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller - Old Dragon</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>🎲 Dice Roller</h1>
            <p class="subtitle">Mesa de RPG Old Dragon</p>
            <input type="text" id="player-name" placeholder="Nome do personagem" maxlength="30">
            <button id="btn-enter">Entrar na Mesa</button>
            <p id="login-error" class="error"></p>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <header>
            <h1>🎲 Dice Roller</h1>
            <div class="header-right">
                <span id="player-name-display"></span>
                <label class="color-picker-label" title="Alterar cor do seu alfinete">
                    <input type="color" id="player-color-input" value="#e94560">
                </label>
                <span id="online-count">👥 0 online</span>
                <button id="btn-logout">Sair</button>
            </div>
        </header>

        <main>
            <aside id="sidebar">
                <h3>Jogadores Online</h3>
                <ul id="online-list"></ul>
                <hr>
                <h3>Iniciativa</h3>
                <div id="initiative-area">
                    <div class="initiative-roll">
                        <input type="number" id="init-modifier" value="0" min="-10" max="20" step="1">
                        <button id="btn-roll-init">Rolar</button>
                    </div>
                    <div class="initiative-npc" id="init-npc-area">
                        <input type="text" id="init-npc-name" placeholder="Nome (opcional)" maxlength="30">
                    </div>
                    <ul id="initiative-list"></ul>
                    <button id="btn-clear-init" class="master-only" style="display:none;">Limpar tudo</button>
                </div>
            </aside>

            <div id="center-area">
                <section id="dice-area">
                    <div class="dice-buttons">
                        <button class="dice-btn" data-dice="d4">d4</button>
                        <button class="dice-btn" data-dice="d6">d6</button>
                        <button class="dice-btn" data-dice="d8">d8</button>
                        <button class="dice-btn" data-dice="d10">d10</button>
                        <button class="dice-btn" data-dice="d12">d12</button>
                        <button class="dice-btn" data-dice="d20">d20</button>
                        <button class="dice-btn" data-dice="d100">d100</button>
                    </div>
                    <div class="roll-input">
                        <input type="text" id="dice-formula" placeholder="d20 ou 2d6+3">
                        <button id="btn-roll">🎲 Rolar!</button>
                    </div>
                </section>

                <section id="grid-area">
                    <div class="grid-header">
                        <h3>Grid de Mapa</h3>
                        <input type="file" id="grid-image-input" accept="image/*">
                        <button id="btn-load-grid" class="master-only" style="display:none;">Carregar Imagem</button>
                        <span class="grid-hint">Máx 5MB</span>
                        <span id="grid-status" class="grid-status"></span>
                    </div>
                    <div id="grid-container">
                        <canvas id="grid-canvas"></canvas>
                    </div>
                </section>

                <section id="history">
                    <h3>Histórico</h3>
                    <div id="roll-list"></div>
                </section>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
